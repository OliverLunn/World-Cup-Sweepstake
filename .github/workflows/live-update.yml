name: Auto Update World Cup Scores

on:
  schedule:
    # Runs every 12 hours every day during the tournament
    - cron: '0 */12 * * *'
  workflow_dispatch: # Allows you to manually click a button to force update anytime

jobs:
  update-scores:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-node: '20'

      - name: Execute Live Scraper Script
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: node update_data.js

      - name: Commit and Push changes back to GitHub Pages
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 System Auto-Update: Fresh World Cup Scores Linked"
          file_pattern: 'live-data.json'